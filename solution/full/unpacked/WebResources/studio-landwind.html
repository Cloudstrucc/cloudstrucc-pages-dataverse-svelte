/* v6 workspace sizing, panel fit, and zoom controls */
.workspace{grid-template-columns:108px 280px minmax(0,1fr) 340px;overflow:hidden}
.rail{min-width:108px;width:108px;padding-left:8px;padding-right:8px}
.rail button{width:92px;min-width:92px;padding-left:4px;padding-right:4px}
.rail button span:last-child{max-width:none!important;width:100%;white-space:nowrap!important;overflow:visible!important;overflow-wrap:normal!important;word-break:normal!important;font-size:11px}
.canvas-wrap{min-width:0;overflow:hidden;position:relative}
.canvas-tools{min-width:0;overflow-x:auto;overflow-y:hidden;white-space:nowrap;scrollbar-width:thin}
.canvas-shell{min-width:0;width:100%;height:100%;overflow:auto;position:relative;display:block}
.canvas{max-width:calc(100% - 32px);min-width:0;transform-origin:top center;will-change:transform}
.right{position:relative;z-index:8;min-width:0;box-shadow:-2px 0 8px #1720330d}
.left{min-width:0;position:relative;z-index:7}
.zoom-group{display:inline-flex;align-items:center;border:1px solid #ccd3df;border-radius:7px;background:#fff;overflow:hidden;flex:0 0 auto}
.zoom-group button{border:0;border-right:1px solid #e1e6ee;background:#fff;padding:8px 10px;min-width:36px}
.zoom-group button:last-child{border-right:0}
.zoom-group button:hover{background:#f1f5f9}
.zoom-value{min-width:55px;text-align:center;font-size:12px;font-weight:700;color:#344054;padding:0 6px}
.workspace.left-collapsed{grid-template-columns:108px 0 minmax(0,1fr) 340px}
.workspace.right-collapsed{grid-template-columns:108px 280px minmax(0,1fr) 0}
.workspace.left-collapsed.right-collapsed{grid-template-columns:108px 0 minmax(0,1fr) 0}
.workspace.focus-canvas{grid-template-columns:108px 0 minmax(0,1fr) 0}
@media(max-width:1100px){.workspace{grid-template-columns:100px 240px minmax(0,1fr)}.rail{width:100px;min-width:100px}.rail button{width:84px;min-width:84px}.right{display:none}}

else if(state.panel==='design'){p.innerHTML=`<div class="section-title">Theme</div><div class="item active"><div class="icon">◈</div><div><b>Landwind Tailwind / Flowbite</b><div style="font-size:11px">Active adapter</div></div></div><button class="btn" data-action="theme-tokens" style="width:100%">Edit design tokens</button><div class="section-title">Assets and graphics</div><input class="search" id="assetSearch" placeholder="Search icon or favicon libraries">${state.assets.map((a,i)=>`<div class="asset"><div class="preview">${a.icon}</div><b>${a.name}</b><div style="font-size:11px">${a.kind}</div><button class="btn" data-asset="${i}">Use</button></div>`).join('')}<button class="btn primary" style="width:100%;margin-top:10px" data-action="upload-image">Upload image</button><button class="btn" style="width:100%;margin-top:8px" data-action="add-asset">Add CSS / asset library</button>`}
else if(state.panel==='data'){p.innerHTML=`<div class="section-title">Data sources</div>${state.dataSources.map((d,i)=>`<div class="item"><div class="icon">⌁</div><div style="flex:1"><b>${d.name}</b><div style="font-size:11px">${d.type} · ${d.status}</div></div><button class="btn" data-ds="${i}">Edit</button></div>`).join('')}<button class="btn primary" style="width:100%" data-action="add-data">Add data source</button><div class="section-title">Query tools</div><button class="btn" style="width:100%" data-action="query-builder">OData / FetchXML builder</button>`}
else if(state.panel==='identity'){p.innerHTML=`<div class="section-title">Authentication</div>${['Anonymous','OpenID Connect','Microsoft Entra ID','Google','Apple','Passkeys / WebAuthn','X.com'].map((x,i)=>`<label class="item"><input type="checkbox" ${i<3?'checked':''}> <span>${x}</span></label>`).join('')}<div class="field"><label>Registration mode</label><select><option>Invitation only</option><option>Open registration</option><option>Admin-created accounts</option></select></div><button class="btn primary" style="width:100%" data-action="identity-config">Configure providers</button>`}
else if(state.panel==='localization'){p.innerHTML=`<div class="section-title">Website languages</div><label class="item"><input type="checkbox" checked disabled> English (default)</label><label class="item"><input id="frToggle" type="checkbox" checked> Français</label><button class="btn primary" style="width:100%;margin:8px 0" data-action="localization-editor">Open localization editor</button><button class="btn" style="width:100%" data-action="auto-translate">Auto translate with AI</button><div class="section-title">Preview language</div><div class="field"><select id="languageSelect"><option value="en" ${state.lang==='en'?'selected':''}>English</option><option value="fr" ${state.lang==='fr'?'selected':''}>Français</option></select></div>`}
else if(state.panel==='permissions'){p.innerHTML=`<div class="tabs"><button class="active">Hierarchy</button><button>Table</button></div><div class="permission-tree"><ul><li><b>Website access</b><ul>${state.permissions.map(x=>`<li><b>${x.name}</b><div style="font-size:11px">${x.table} · ${x.scope}</div></li>`).join('')}</ul></li></ul></div><button class="btn primary" style="width:100%" data-action="add-permission">Add permission</button>`}
else p.innerHTML=`<div class="section-title">Site settings</div><div class="field"><label>Site name</label><input value="Cloudstrucc Portal"></div><div class="field"><label>Repository</label><input value="https://github.com/Cloudstrucc/pages-site"></div><div class="field"><label>Environment</label><select><option>Development</option><option>Test</option><option>Production</option></select></div><button class="btn primary" style="width:100%" data-action="save-settings">Save settings</button><button class="btn" style="width:100%;margin-top:8px" data-action="cli">CLI commands</button>`;
wireLeft()}
function wireLeft(){document.querySelectorAll('[data-page]').forEach(x=>x.onclick=()=>{state.page=x.dataset.page;state.selected=null;renderAll()});document.querySelectorAll('[data-lib]').forEach(x=>{x.ondragstart=e=>e.dataTransfer.setData('text/plain',x.dataset.lib);x.onclick=()=>openComponentModal(library.find(c=>c.id===x.dataset.lib))});document.querySelectorAll('[data-action]').forEach(x=>x.onclick=()=>handleAction(x.dataset.action));document.querySelectorAll('[data-asset]').forEach(x=>x.onclick=()=>toast('Asset added to theme manifest'));document.querySelectorAll('[data-ds]').forEach(x=>x.onclick=()=>openDataSource(state.dataSources[+x.dataset.ds]));if(window.languageSelect)languageSelect.onchange=()=>{state.lang=languageSelect.value;renderAll()}}
function renderCanvas(){const page=state.pages[state.page];pageLabel.textContent=page.name;canvas.style.setProperty('--grid-cols',state.layout.columns);canvas.style.setProperty('--grid-gap',state.layout.gap+'px');canvas.style.setProperty('--row-height',state.layout.rowHeight+'px');canvas.innerHTML=page.components.map(renderComponent).join('');canvas.classList.toggle('grid',state.grid);gridRuler.innerHTML=`<span class="grid-chip">${state.layout.columns} columns</span><span class="grid-chip">${state.layout.gap}px gap</span><span class="grid-chip">Snap ${state.layout.snap?'on':'off'}</span>`;canvas.ondragover=e=>{e.preventDefault();canvas.classList.add('dragover')};canvas.ondragleave=()=>canvas.classList.remove('dragover');canvas.ondrop=e=>{e.preventDefault();canvas.classList.remove('dragover');const c=library.find(x=>x.id===e.dataTransfer.getData('text/plain'));if(c)openComponentModal(c)};wireCanvas()}

function wireCanvas(){let dragId=null;document.querySelectorAll('.cmp').forEach(el=>{el.onclick=e=>{if(e.target.closest('button,input,select,textarea'))return;state.selected=el.dataset.id;renderCanvas();renderRight()};el.ondragstart=e=>{dragId=el.dataset.id;el.classList.add('dragging');e.dataTransfer.setData('application/x-cs-component',dragId)};el.ondragend=()=>{el.classList.remove('dragging');document.querySelectorAll('.cmp').forEach(x=>x.classList.remove('drag-target'))};el.ondragover=e=>{if(e.dataTransfer.types.includes('application/x-cs-component')){e.preventDefault();el.classList.add('drag-target')}};el.ondragleave=()=>el.classList.remove('drag-target');el.ondrop=e=>{const id=e.dataTransfer.getData('application/x-cs-component');if(id&&id!==el.dataset.id){e.preventDefault();snapshot();const a=state.pages[state.page].components,from=a.findIndex(x=>x.id===id),to=a.findIndex(x=>x.id===el.dataset.id),m=a.splice(from,1)[0];const rect=canvas.getBoundingClientRect(),unit=rect.width/state.layout.columns;m.col=Math.max(1,Math.min(state.layout.columns-(m.span||12)+1,Math.floor((e.clientX-rect.left)/unit)+1));a.splice(to,0,m);renderAll();toast('Component snapped to column '+m.col+' and source updated')}};el.querySelectorAll('[data-cmd]').forEach(b=>b.onclick=e=>{e.stopPropagation();componentCommand(el.dataset.id,b.dataset.cmd)});const h=el.querySelector('.resize');if(h)h.onmousedown=e=>startResize(e,el)});document.querySelectorAll('[data-language-switch]').forEach(b=>b.onclick=e=>{e.stopPropagation();state.lang=state.lang==='en'?'fr':'en';renderAll()});document.querySelectorAll('[data-step]').forEach(b=>b.onclick=e=>{e.stopPropagation();const c=findCmp(b.dataset.wiz);c.activeStep=+b.dataset.step;snapshot();renderCanvas();renderRight()});document.querySelectorAll('[data-edit-step]').forEach(b=>b.onclick=e=>{e.stopPropagation();openSource(findCmp(b.dataset.editStep),true)})}

<style id="v7-panel-layout-fix">
/* v7: reliable panel reflow and conventional panel controls */
.workspace{
  --rail-width:108px;
  --left-width:280px;
  --right-width:340px;
  grid-template-columns:var(--rail-width) var(--left-width) minmax(0,1fr) var(--right-width)!important;
  min-width:0;
}
.workspace.left-collapsed{--left-width:0px}
.workspace.right-collapsed{--right-width:0px}
.workspace.left-collapsed.right-collapsed,
.workspace.focus-canvas{--left-width:0px;--right-width:0px}
.workspace.left-collapsed .left,
.workspace.right-collapsed .right,
.workspace.focus-canvas .left,
.workspace.focus-canvas .right{display:none!important}
.canvas-wrap,.canvas-shell{min-width:0;max-width:100%}
.canvas-shell{position:relative;overscroll-behavior:contain}
.canvas{transform-origin:top center}
.panel-toggle-icon{width:20px;height:20px;display:block;pointer-events:none}
.panel-toggle-icon path,.panel-toggle-icon line,.panel-toggle-icon polyline{stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
#toggleLeft,#toggleRight,.panel-collapse{display:inline-flex;align-items:center;justify-content:center}
#toggleLeft,#toggleRight{flex:0 0 38px;width:38px;height:36px;padding:0}
.panel-collapse{width:30px;height:30px;padding:0}
@media(max-width:1100px){
  .workspace{--rail-width:100px;--left-width:240px;--right-width:0px}
  .workspace .right{display:none!important}
}
</style>
<script id="v7-panel-layout-script">
(function(){
  const ws=document.getElementById('workspace');
  const shell=document.querySelector('.canvas-shell');
  const siteCanvas=document.getElementById('canvas');
  const leftToggle=document.getElementById('toggleLeft');
  const rightToggle=document.getElementById('toggleRight');
  const leftInside=document.getElementById('collapseLeft');
  const rightInside=document.getElementById('collapseRight');
  const focus=document.getElementById('focusCanvas');
  if(!ws||!shell||!siteCanvas)return;

  const svg={
    menu:'<svg class="panel-toggle-icon" viewBox="0 0 24 24" aria-hidden="true"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg>',
    left:'<svg class="panel-toggle-icon" viewBox="0 0 24 24" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>',
    right:'<svg class="panel-toggle-icon" viewBox="0 0 24 24" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg>',
    config:'<svg class="panel-toggle-icon" viewBox="0 0 24 24" aria-hidden="true"><rect x="4" y="4" width="16" height="16" rx="2"/><line x1="14" y1="4" x2="14" y2="20"/></svg>'
  };

  function updateIcons(){
    const leftClosed=ws.classList.contains('left-collapsed')||ws.classList.contains('focus-canvas');
    const rightClosed=ws.classList.contains('right-collapsed')||ws.classList.contains('focus-canvas');
    if(leftToggle){
      leftToggle.innerHTML=leftClosed?svg.menu:svg.left;
      leftToggle.title=leftClosed?'Show menu details':'Hide menu details';
      leftToggle.setAttribute('aria-label',leftToggle.title);
      leftToggle.setAttribute('aria-expanded',String(!leftClosed));
    }
    if(rightToggle){
      rightToggle.innerHTML=rightClosed?svg.config:svg.right;
      rightToggle.title=rightClosed?'Show configuration panel':'Hide configuration panel';
      rightToggle.setAttribute('aria-label',rightToggle.title);
      rightToggle.setAttribute('aria-expanded',String(!rightClosed));
    }
    if(leftInside){leftInside.innerHTML=svg.left;leftInside.title='Hide menu details';leftInside.setAttribute('aria-label',leftInside.title)}
    if(rightInside){rightInside.innerHTML=svg.right;rightInside.title='Hide configuration panel';rightInside.setAttribute('aria-label',rightInside.title)}
  }

  function applyZoomValue(z){
    const bounded=Math.max(.4,Math.min(1.15,z));
    try{state.zoom=bounded}catch(_e){}
    siteCanvas.style.zoom=bounded;
    const value=document.getElementById('zoomValue');
    if(value)value.textContent=Math.round(bounded*100)+'%';
  }

  function refit(resetScroll=true){
    // Two animation frames ensure CSS Grid has finished reallocating tracks.
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      const available=Math.max(320,shell.clientWidth-32);
      const natural=siteCanvas.classList.contains('mobile')?390:siteCanvas.classList.contains('tablet')?768:1180;
      applyZoomValue(available/natural);
      if(resetScroll){
        shell.scrollLeft=0;
        shell.scrollTop=0;
      }
      siteCanvas.style.visibility='visible';
      updateIcons();
    }));
  }

  function toggleLeftPanel(){
    ws.classList.remove('focus-canvas');
    document.querySelector('.canvas-shell')?.classList.remove('expanded');
    ws.classList.toggle('left-collapsed');
    refit(true);
  }
  function toggleRightPanel(){
    ws.classList.remove('focus-canvas');
    document.querySelector('.canvas-shell')?.classList.remove('expanded');
    ws.classList.toggle('right-collapsed');
    refit(true);
  }

  if(leftToggle)leftToggle.onclick=toggleLeftPanel;
  if(leftInside)leftInside.onclick=toggleLeftPanel;
  if(rightToggle)rightToggle.onclick=toggleRightPanel;
  if(rightInside)rightInside.onclick=toggleRightPanel;
  if(focus){
    focus.onclick=()=>{
      const active=ws.classList.toggle('focus-canvas');
      document.querySelector('.canvas-shell')?.classList.toggle('expanded',active);
      focus.textContent=active?'Restore panels':'Expand canvas';
      refit(true);
    };
  }

  const fit=document.getElementById('fitCanvas');
  if(fit)fit.onclick=()=>refit(true);
  let lastShellWidth=Math.round(shell.getBoundingClientRect().width);
  const ro=new ResizeObserver(entries=>{
    const next=Math.round(entries[0]?.contentRect?.width||0);
    if(next&&Math.abs(next-lastShellWidth)>1){lastShellWidth=next;refit(false)}
  });
  ro.observe(shell);
  window.addEventListener('resize',()=>refit(false));
  updateIcons();
  refit(true);
})();
</script>

<script id="v8-flex-workspace-script">
(function(){
  const ws=document.getElementById('workspace');
  const shell=document.querySelector('.canvas-shell');
  const siteCanvas=document.getElementById('canvas');
  if(!ws||!shell||!siteCanvas)return;

  function naturalCanvasWidth(){
    if(siteCanvas.classList.contains('mobile'))return 390;
    if(siteCanvas.classList.contains('tablet'))return 768;
    return 1180;
  }

  function fitAfterLayout(resetScroll){
    siteCanvas.style.visibility='visible';
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      const available=Math.max(300,shell.getBoundingClientRect().width-32);
      const scale=Math.max(.4,Math.min(1.15,available/naturalCanvasWidth()));
      if(typeof state!=='undefined')state.zoom=scale;
      siteCanvas.style.zoom=scale;
      const zv=document.getElementById('zoomValue');
      if(zv)zv.textContent=Math.round(scale*100)+'%';
      if(resetScroll){shell.scrollLeft=0;shell.scrollTop=0;}
      siteCanvas.style.visibility='visible';
    }));
  }

  function iconSvg(kind){
    if(kind==='menu')return '<svg class="panel-toggle-icon" viewBox="0 0 24 24" aria-hidden="true"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg>';
    if(kind==='left')return '<svg class="panel-toggle-icon" viewBox="0 0 24 24" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>';
    if(kind==='right')return '<svg class="panel-toggle-icon" viewBox="0 0 24 24" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg>';
    return '<svg class="panel-toggle-icon" viewBox="0 0 24 24" aria-hidden="true"><rect x="4" y="4" width="16" height="16" rx="2"/><line x1="14" y1="4" x2="14" y2="20"/></svg>';
  }

  function syncButtons(){
    const lc=ws.classList.contains('left-collapsed')||ws.classList.contains('focus-canvas');
    const rc=ws.classList.contains('right-collapsed')||ws.classList.contains('focus-canvas');
    const l=document.getElementById('toggleLeft');
    const r=document.getElementById('toggleRight');
    if(l){l.innerHTML=iconSvg(lc?'menu':'left');l.title=lc?'Show menu details':'Hide menu details';l.setAttribute('aria-expanded',String(!lc));}
    if(r){r.innerHTML=iconSvg(rc?'config':'right');r.title=rc?'Show configuration panel':'Hide configuration panel';r.setAttribute('aria-expanded',String(!rc));}
  }

  function toggleLeft(){
    ws.classList.remove('focus-canvas');
    shell.classList.remove('expanded');
    ws.classList.toggle('left-collapsed');
    syncButtons();fitAfterLayout(true);
  }
  function toggleRight(){
    ws.classList.remove('focus-canvas');
    shell.classList.remove('expanded');
    ws.classList.toggle('right-collapsed');
    syncButtons();fitAfterLayout(true);
  }

  const tl=document.getElementById('toggleLeft');
  const tr=document.getElementById('toggleRight');
  const cl=document.getElementById('collapseLeft');
  const cr=document.getElementById('collapseRight');
  if(tl)tl.onclick=toggleLeft;
  if(cl)cl.onclick=toggleLeft;
  if(tr)tr.onclick=toggleRight;
  if(cr)cr.onclick=toggleRight;

  const focus=document.getElementById('focusCanvas');
  if(focus)focus.onclick=()=>{
    const on=ws.classList.toggle('focus-canvas');
    shell.classList.toggle('expanded',on);
    focus.textContent=on?'Restore panels':'Expand canvas';
    syncButtons();fitAfterLayout(true);
  };

  const fit=document.getElementById('fitCanvas');
  if(fit)fit.onclick=()=>fitAfterLayout(true);

  const ro=new ResizeObserver(()=>fitAfterLayout(false));
  ro.observe(shell);
  syncButtons();fitAfterLayout(true);
})();
</script>

<script id="v9-panel-fix-script">
(function(){
  const ws=document.querySelector('.workspace');
  if(!ws)return;
  let leftTab=document.getElementById('leftRestoreTab');
  let rightTab=document.getElementById('rightRestoreTab');
  if(!leftTab){
    leftTab=document.createElement('button');
    leftTab.id='leftRestoreTab';leftTab.type='button';leftTab.title='Show menu panel';
    leftTab.setAttribute('aria-label','Show menu panel');leftTab.innerHTML='›';ws.appendChild(leftTab);
  }
  if(!rightTab){
    rightTab=document.createElement('button');
    rightTab.id='rightRestoreTab';rightTab.type='button';rightTab.title='Show configuration panel';
    rightTab.setAttribute('aria-label','Show configuration panel');rightTab.innerHTML='‹';ws.appendChild(rightTab);
  }
  const leftToolbar=document.getElementById('toggleLeft');
  const rightToolbar=document.getElementById('toggleRight');
  const leftInside=document.getElementById('collapseLeft');
  const rightInside=document.getElementById('collapseRight');
  function refit(){
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      const shell=document.querySelector('.canvas-shell');
      if(shell){shell.scrollLeft=0;}
      if(typeof window.fitCanvasToArea==='function')window.fitCanvasToArea();
      window.dispatchEvent(new Event('resize'));
    }));
  }
  function sync(){
    const lc=ws.classList.contains('left-collapsed')||ws.classList.contains('focus-canvas');
    const rc=ws.classList.contains('right-collapsed')||ws.classList.contains('focus-canvas');
    if(leftToolbar){leftToolbar.innerHTML=lc?'☰':'‹';leftToolbar.title=lc?'Show menu panel':'Hide menu panel';}
    if(rightToolbar){rightToolbar.innerHTML=rc?'▤':'›';rightToolbar.title=rc?'Show configuration panel':'Hide configuration panel';}
    if(leftInside){leftInside.innerHTML='‹';leftInside.title='Collapse menu panel';}
    if(rightInside){rightInside.innerHTML='›';rightInside.title='Collapse configuration panel';}
  }
  function toggleLeft(e){if(e)e.preventDefault();ws.classList.toggle('left-collapsed');sync();refit();}
  function toggleRight(e){if(e)e.preventDefault();ws.classList.toggle('right-collapsed');sync();refit();}
  [leftToolbar,leftInside,leftTab].filter(Boolean).forEach(el=>el.onclick=toggleLeft);
  [rightToolbar,rightInside,rightTab].filter(Boolean).forEach(el=>el.onclick=toggleRight);
  sync();refit();
})();
</script>
