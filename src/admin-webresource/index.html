<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Cloudstrucc Pages Administration</title><style>
*{box-sizing:border-box}body{margin:0;font-family:Inter,Arial,sans-serif;background:#f3f5f8;color:#172033}button,input,select,textarea{font:inherit}.shell{height:100vh;display:grid;grid-template-columns:230px 1fr}.nav{background:#172033;color:white;padding:18px 10px}.logo{font-weight:900;font-size:20px;padding:10px 12px 22px}.nav button{width:100%;border:0;background:transparent;color:#d4dae5;text-align:left;padding:11px 12px;border-radius:7px;margin:2px 0}.nav button.active,.nav button:hover{background:#2a3850;color:#fff}.main{overflow:auto}.top{height:60px;background:#fff;border-bottom:1px solid #dfe4ec;display:flex;align-items:center;padding:0 22px}.top h2{margin:0}.top .actions{margin-left:auto}.btn{border:1px solid #cfd6e1;background:#fff;padding:9px 13px;border-radius:7px;cursor:pointer}.btn.primary{background:#2f6fed;color:#fff;border-color:#2f6fed}.content{padding:24px}.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.card{background:#fff;border:1px solid #dfe4ec;border-radius:12px;padding:18px;box-shadow:0 5px 20px #1720330c}.metric{font-size:30px;font-weight:900}.table{width:100%;border-collapse:collapse;background:white}.table th,.table td{padding:12px;border-bottom:1px solid #e4e8ef;text-align:left}.field{margin-bottom:12px}.field label{display:block;font-size:12px;font-weight:800;margin-bottom:5px}.field input,.field select,.field textarea{width:100%;padding:10px;border:1px solid #cad2df;border-radius:7px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}.theme-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.theme{border:2px solid #dbe1ea;border-radius:10px;overflow:hidden;background:white}.theme.selected{border-color:#2f6fed}.thumb{height:150px;padding:12px}.theme h3,.theme p{margin:8px 12px}.bootstrap-thumb{background:linear-gradient(130deg,#0d6efd,#6f42c1);color:#fff;text-align:center;padding-top:45px}.landwind-thumb{background:#f9fafb}.landwind-thumb .hero{height:55px;background:linear-gradient(120deg,#eef2ff,#ecfeff);border-radius:8px}.landwind-thumb .blocks{display:flex;gap:7px;margin-top:12px}.landwind-thumb .blocks i{height:45px;flex:1;background:#fff;border:1px solid #e5e7eb;border-radius:7px}.gc-thumb{background:#fff;color:#26374a;border-top:12px solid #26374a}.gc-thumb .red{height:5px;background:#a62a1e;margin:12px 0}.pill{display:inline-block;padding:4px 8px;border-radius:999px;background:#e9f8ef;color:#14723b;font-size:11px}.modal{position:fixed;inset:0;background:#0009;display:grid;place-items:center}.dialog{width:min(960px,94vw);max-height:90vh;overflow:auto;background:#fff;border-radius:12px}.head,.foot{padding:16px 20px;border-bottom:1px solid #e0e5ec;display:flex;align-items:center;gap:10px}.head h2{margin:0}.head button{margin-left:auto}.body{padding:20px}.foot{border-top:1px solid #e0e5ec;border-bottom:0;justify-content:flex-end}.preview{height:540px;border:1px solid #dce2eb;border-radius:8px;overflow:hidden}.preview iframe{width:100%;height:100%;border:0}.menu-section{display:none}.menu-section.active{display:block}@media(max-width:900px){.shell{grid-template-columns:70px 1fr}.nav button{font-size:0}.nav button:before{content:'•';font-size:20px}.logo{font-size:0}.cards,.theme-grid,.grid2{grid-template-columns:1fr}}
</style></head><body><div class="shell"><aside class="nav"><div class="logo">Cloudstrucc Admin</div><button class="active" data-view="overview">Overview</button><button data-view="websites">Websites</button><button data-view="domains">Domains</button><button data-view="identity">Identity providers</button><button data-view="connections">Connections</button><button data-view="permissions">Permissions</button><button data-view="solutions">Solutions & ALM</button><button data-view="environments">Environments</button><button data-view="audit">Audit logs</button></aside><main class="main"><header class="top"><h2 id="title">Overview</h2><div class="actions"><button class="btn primary" id="newSite">Create website</button></div></header><div class="content" id="content"></div></main></div><div id="modal"></div><script>
const sites=[{name:'Citizen Services Portal',theme:'GC Design System',url:'citizen-services.powerappsportals.com',status:'Ready',languages:['English','Français']},{name:'Innovation Hub',theme:'Landwind',url:'innovation-hub.powerappsportals.com',status:'Ready',languages:['English']}];let selectedTheme='bootstrap';
const views={overview:()=>`<div class="cards"><div class="card"><small>Websites</small><div class="metric">${sites.length}</div></div><div class="card"><small>Custom domains</small><div class="metric">3</div></div><div class="card"><small>Solution deployments</small><div class="metric">18</div></div></div><h3>Recent websites</h3>${siteTable()}`,websites:()=>`<div style="display:flex;justify-content:space-between"><h3>Websites</h3><button class="btn primary" onclick="openCreate()">Create website</button></div>${siteTable()}`,domains:()=>`<h3>Domains</h3><table class="table"><tr><th>Domain</th><th>Website</th><th>TLS</th><th>Languages</th><th>Status</th><th></th></tr><tr><td>services.cloudstrucc.com</td><td>Citizen Services Portal</td><td>Managed certificate</td><td><span class="pill">Verified</span></td><td><button class="btn">Edit</button></td></tr><tr><td>innovation.cloudstrucc.com</td><td>Innovation Hub</td><td>Bring your own</td><td>Pending DNS</td><td><button class="btn">Verify</button></td></tr></table><button class="btn primary" onclick="simpleModal('Add domain','Domain name, website association, DNS validation and certificate settings would be configured here.')">Add domain</button>`,identity:()=>`<h3>Identity providers</h3><div class="cards">${['Microsoft Entra ID','OpenID Connect','Google','Apple','Passkeys / WebAuthn','X.com','Anonymous'].map((x,i)=>`<div class="card"><h3>${x}</h3><p>${i<2?'Configured':'Not configured'}</p><button class="btn" onclick="simpleModal('Configure ${x}','Client credentials, issuer metadata, claims mapping, registration policy and testing controls.')">Configure</button></div>`).join('')}</div><h3>Registration policy</h3><div class="card grid2"><div class="field"><label>Registration mode</label><select><option>Invitation only</option><option>Open registration</option><option>Admin-created users</option></select></div><div class="field"><label>Default role</label><select><option>Authenticated Users</option></select></div></div>`,con <tr><td>cs_DefaultTheme</td><td>GC Design System</td><td>No</td></tr></table>`,environments:()=>`<h3>Environments</h3><table class="table"><tr><th>Name</th><th>Type</th><th>Region</th><th>Dataverse</th><th></th></tr><tr><td>Cloudstrucc DEV</td><td>Developer</td><td>Canada</td><td><span class="pill">Ready</span></td><td><button class="btn">Open</button></td></tr><tr><td>Cloudstrucc TEST</td><td>Sandbox</td><td>Canada</td><td><span class="pill">Ready</span></td><td><button class="btn">Open</button></td></tr></table>`,audit:()=>`<h3>Audit logs</h3><table class="table"><tr><th>Time</th><th>User</th><th>Action</th><th>Target</th></tr><tr><td>10:42</td><td>Admin</td><td>Published website</td><td>Citizen Services Portal</td></tr><tr><td>09:30</td><td>Maker</td><td>Updated identity provider</td><td>Microsoft Entra ID</td></tr></table>`};
function siteTable(){return `<table class="table"><tr><th>Name</th><th>Theme</th><th>URL</th><th>Languages</th><th>Status</th><th></th></tr>${sites.map((s,i)=>`<tr><td>${s.name}</td><td>${s.theme}</td><td>${s.url}</td><td>${(s.languages||['English']).join(', ')}</td><td><span class="pill">${s.status}</span></td><td><button class="btn" onclick="launchStudio(${i})">Open Studio</button></td></tr>`).join('')}</table>`}function render(v='overview'){title.textContent=v[0].toUpperCase()+v.slice(1);content.innerHTML=views[v]()}document.querySelectorAll('.nav button').forEach(b=>b.onclick=()=>{document.querySelectorAll('.nav button').forEach(x=>x.classList.remove('active'));b.classList.add('active');render(b.dataset.view)});newSite.onclick=()=>openCreate();
